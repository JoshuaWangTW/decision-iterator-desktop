name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: 安裝依賴
        run: npm ci

      - name: 語法檢查(所有 .mjs / .cjs)
        run: |
          for f in $(git ls-files '*.mjs' '*.cjs'); do
            node --check "$f"
          done

      - name: Smoke 測試(headless,建 session → 渲染看板 → 驗證)
        run: npm run smoke
